spring.application.name=rikkei-bank

# SERVER CONFIGURATION
server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3306/rikkeibankdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=datloc78

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT CONFIGURATION
jwt.secret=yourSuperSecretKeyForRikkeiBank2026AtLeast256BitLong
jwt.access.token.expiration=300000
jwt.refresh.token.expiration=86400000

# SECURITY
spring.security.filter.order=1

# FILE UPLOAD (eKYC)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# LOGGING
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

